# Ambiente de desarrollo local - Plan v3.0 sección 10
# Servicios: postgres, keycloak, backend, frontend
# Uso: docker compose -f docker-compose.dev.yml up -d --build

name: inventory-qas-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: inventory-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
      POSTGRES_USER: ${POSTGRES_USER:-inventory_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventory_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventory_user} -d ${POSTGRES_DB:-inventory}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - inventory-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: inventory-keycloak-dev
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
      # Tokens con issuer http://localhost:8081 (mismo que usa el navegador)
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8081
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    # Keycloak tarda en el primer arranque; backend solo espera que el contenedor exista (Fase 0)
    networks:
      - inventory-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory-backend-dev
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/inventory}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-inventory_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-inventory_password}
      # iss del JWT = http://localhost:8081/... (debe coincidir exactamente)
      KEYCLOAK_ISSUER_URI: http://localhost:8081/realms/inventory-realm
      KEYCLOAK_JWKS_URI: http://host.docker.internal:8081/realms/inventory-realm/protocol/openid-connect/certs
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4317}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-inventory-api}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - inventory-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventory-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-/keycloak}
      NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-inventory-realm}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-inventory-frontend}
      API_PROXY_TARGET: http://backend:8080
      # Tokens con iss localhost:8081 (mismo issuer que valida el backend)
      KEYCLOAK_PROXY_TARGET: http://host.docker.internal:8081
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
      - keycloak
    networks:
      - inventory-net

volumes:
  postgres_dev_data:
  frontend_node_modules:

networks:
  inventory-net:
    driver: bridge
