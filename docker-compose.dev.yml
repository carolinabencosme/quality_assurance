# Ambiente de desarrollo local - Plan v3.0 sección 10 (QA-13)
# Servicios: postgres, keycloak, backend, frontend
# Puertos host: postgres 5432 | keycloak 8081 | backend 8080 | frontend 3000
# Red: inventory-net (bridge)
# Uso: docker compose -f docker-compose.dev.yml up -d --build
# Fase 5 (observabilidad): añadir -f docker-compose.observability.yml

name: inventory-qas-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: inventory-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
      POSTGRES_USER: ${POSTGRES_USER:-inventory_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventory_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventory_user} -d ${POSTGRES_DB:-inventory}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - inventory-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: inventory-keycloak-dev
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
      # URL pública del IdP (navegador). No usar /keycloak proxy: Keycloak genera URLs en :8080 interno.
      KC_HOSTNAME: http://localhost:8081
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
    healthcheck:
      # Sin curl en la imagen; comprobación TCP al puerto HTTP (import realm ~2 min en primer arranque)
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 180s
    networks:
      - inventory-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory-backend-dev
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev,observability}
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/inventory}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-inventory_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-inventory_password}
      # iss del JWT = http://localhost:8081/... (debe coincidir con el token del navegador/Newman)
      KEYCLOAK_ISSUER_URI: http://localhost:8081/realms/inventory-realm
      # JWKS: red interna Docker (host.docker.internal:8081 falla en algunos Windows → 401 en API)
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/inventory-realm/protocol/openid-connect/certs
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-inventory-api}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    networks:
      - inventory-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventory-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-http://localhost:8081}
      NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-inventory-realm}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-inventory-frontend}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      API_PROXY_TARGET: http://backend:8080
      # Proxy OIDC: red interna Docker (host.docker.internal:8081 → 404 en Windows)
      KEYCLOAK_PROXY_TARGET: http://keycloak:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      # .next en volumen Docker: no bloquea frontend/.next en el host (EPERM en Windows)
      - frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - inventory-net

volumes:
  postgres_dev_data:
  frontend_node_modules:
  frontend_next:

networks:
  inventory-net:
    driver: bridge
