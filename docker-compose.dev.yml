# Ambiente de desarrollo local - Plan v3.0 sección 10
# Servicios: postgres, keycloak, backend, frontend
# Uso: docker compose -f docker-compose.dev.yml up -d --build

name: inventory-qas-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: inventory-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
      POSTGRES_USER: ${POSTGRES_USER:-inventory_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventory_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventory_user} -d ${POSTGRES_DB:-inventory}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - inventory-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: inventory-keycloak-dev
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    # Keycloak tarda en el primer arranque; backend solo espera que el contenedor exista (Fase 0)
    networks:
      - inventory-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory-backend-dev
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/inventory}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-inventory_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-inventory_password}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://keycloak:8080/realms/inventory-realm}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI:-http://keycloak:8080/realms/inventory-realm/protocol/openid-connect/certs}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4317}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-inventory-api}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - inventory-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventory-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api/v1}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8081}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-inventory-realm}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-inventory-frontend}
    volumes:
      - ./frontend:/app
      # Sin volumen anónimo en node_modules: npm ci al iniciar sincroniza dependencias (p. ej. react-router-dom)
    depends_on:
      - backend
    networks:
      - inventory-net

volumes:
  postgres_dev_data:

networks:
  inventory-net:
    driver: bridge
