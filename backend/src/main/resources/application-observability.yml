# Perfil opcional: spring.profiles.include=observability (o activar vía Docker)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:dev}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
    metrics:
      export:
        enabled: ${OTEL_METRICS_EXPORT_ENABLED:true}
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://localhost:4318/v1/metrics}

# Logging estructurado JSON (Loki / Grafana) — QA-19
logging:
  structured:
    format:
      console: logstash
  pattern:
    level: "%5p [app=${spring.application.name:},user=%X{user:-},endpoint=%X{endpoint:-},trace=%X{traceId:-},span=%X{spanId:-},corr=%X{correlationId:-}]"
