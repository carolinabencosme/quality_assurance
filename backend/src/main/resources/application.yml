spring:
  application:
    name: inventory-api
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
      org.hibernate.envers:
        audit_table_suffix: _aud
        revision_field_name: rev
        revision_type_field_name: revtype
        store_data_at_delete: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/inventory-realm}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8081/realms/inventory-realm/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8080}

# /actuator/health debe permanecer publico (Docker healthcheck, Fase 2 Security)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

inventory:
  api:
    version: v1
  security:
    enabled: true
  cors:
    allowed-origins: ${INVENTORY_CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
