# Perfil test - mvn test / CI (Fase 0, sin BD)
spring:
  main:
    banner-mode: off
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost/realms/inventory-realm
          jwk-set-uri: http://localhost/realms/inventory-realm/protocol/openid-connect/certs

logging:
  level:
    root: WARN
    com.company.inventory: INFO

management:
  endpoint:
    health:
      show-details: never
