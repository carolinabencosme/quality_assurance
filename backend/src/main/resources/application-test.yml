# Perfil test - mvn test / CI (sin Keycloak; JwtDecoder solo en tests que lo importan)
spring:
  main:
    banner-mode: off
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

logging:
  level:
    root: WARN
    com.company.inventory: INFO

management:
  endpoint:
    health:
      show-details: never
  health:
    db:
      enabled: false
