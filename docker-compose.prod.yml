name: inventory-qas-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
      POSTGRES_USER: ${POSTGRES_USER:-inventory_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventory_prod_password_change_me}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./docker/init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventory_user} -d ${POSTGRES_DB:-inventory}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - inventory-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    restart: unless-stopped
    command: start --import-realm --http-enabled=true --hostname-strict=false
    environment:
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: ${KC_HOSTNAME:-http://localhost:8081}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_prod_password_change_me}
    ports:
      - "8081:8080"
    volumes:
      - keycloak_prod_data:/opt/keycloak/data
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8080'"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 120s
    networks:
      - inventory-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,observability}
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/inventory}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-inventory_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-inventory_prod_password_change_me}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://localhost:8081/realms/inventory-realm}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI:-http://keycloak:8080/realms/inventory-realm/protocol/openid-connect/certs}
      INVENTORY_CORS_ORIGINS: ${INVENTORY_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-inventory-api}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    networks:
      - inventory-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-http://localhost:8081}
      NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-inventory-realm}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-inventory-frontend}
      NEXT_PUBLIC_KEYCLOAK_API_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_API_CLIENT_ID:-inventory-api}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      API_PROXY_TARGET: http://backend:8080
      KEYCLOAK_PROXY_TARGET: http://keycloak:8080
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - inventory-net

volumes:
  postgres_prod_data:
  keycloak_prod_data:

networks:
  inventory-net:
    driver: bridge
