name: Dependency Check

# Primera ejecucion con NVD_API_KEY puede tardar 60-90 min (descarga ~370k CVEs).
# Luego el cache hace que los siguientes runs sean mucho mas rapidos.
# No se dispara en cada push a main para no quemar minutos de Actions.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Require NVD_API_KEY
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "${NVD_API_KEY:-}" ]; then
            echo "::warning::NVD_API_KEY no configurado. Se omite Dependency-Check."
            echo "1) Key gratis: https://nvd.nist.gov/developers/request-an-api-key"
            echo "2) Settings → Secrets and variables → Actions → NVD_API_KEY"
            echo "SKIP_ODC=true" >> "$GITHUB_ENV"
          else
            echo "NVD_API_KEY presente (longitud=${#NVD_API_KEY}). Continuando con el scan."
            echo "SKIP_ODC=false" >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-java@v4
        if: env.SKIP_ODC != 'true'
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache OWASP Dependency-Check database
        if: env.SKIP_ODC != 'true'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.dependency-check-data
          key: odc-db-${{ runner.os }}-12.1.3-v2
          restore-keys: |
            odc-db-${{ runner.os }}-12.1.3
            odc-db-${{ runner.os }}-

      - name: Run OWASP Dependency Check
        if: env.SKIP_ODC != 'true'
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          set -euo pipefail
          DATA_DIR="${{ github.workspace }}/.dependency-check-data"
          mkdir -p "$DATA_DIR"
          echo "Iniciando Dependency-Check. La primera vez puede tardar hasta ~90 min."
          mvn -B org.owasp:dependency-check-maven:check \
            "-DdataDirectory=${DATA_DIR}" \
            "-DfailBuildOnCVSS=9" \
            "-DnvdApiDelay=1500" \
            "-DnvdApiKey=${NVD_API_KEY}" \
            "-DossIndexAnalyzerEnabled=false" \
            "-Danalyzer.ossindex.enabled=false"

      - name: Upload Dependency Check reports
        if: env.SKIP_ODC != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            backend/target/dependency-check-report.html
            backend/target/dependency-check-report.json
          if-no-files-found: ignore
