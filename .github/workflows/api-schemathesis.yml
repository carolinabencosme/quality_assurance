name: API Schemathesis

on:
  workflow_dispatch:
  push:
    branches: [main, develop, presentacion]

permissions:
  contents: read

jobs:
  schemathesis:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Start backend stack
        run: docker compose -f docker-compose.dev.yml -f docker-compose.test.yml up -d --build postgres keycloak backend

      - name: Wait for OpenAPI
        shell: bash
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8080/v3/api-docs >/dev/null 2>&1; then
              echo "OpenAPI OK"
              exit 0
            fi
            sleep 3
          done
          docker compose -f docker-compose.dev.yml -f docker-compose.test.yml logs backend --tail 150
          exit 1

      - name: Run Schemathesis
        env:
          SCHEMATHESIS_SCHEMA_URL: http://localhost:8080/v3/api-docs
        run: |
          chmod +x scripts/run-schemathesis.sh
          ./scripts/run-schemathesis.sh

      - name: Upload Schemathesis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schemathesis-report
          path: docs/qa-evidence/schemathesis-report.txt
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml -f docker-compose.test.yml down -v
