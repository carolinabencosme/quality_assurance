name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Test with JaCoCo (unit + integration + coverage gate)
        run: mvn -B verify
      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 14

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install, lint and build
        run: |
          npm ci
          npm run build

  sonar:
    name: Quality Gate (SonarQube)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: SonarQube scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'http://localhost:9000' }}
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "SONAR_TOKEN no configurado; se omite el quality gate."
            exit 0
          fi
          cd backend && mvn -B verify
          mvn -B -f backend/pom.xml sonar:sonar \
            -Dsonar.projectKey=inventory-qas \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.projectBaseDir=.

  security-smoke:
    name: Security smoke (optional)
    runs-on: ubuntu-latest
    needs: [backend]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run auth smoke script
        shell: bash
        run: |
          if [ -f tests/security/auth-smoke.ps1 ]; then
            echo "Security smoke requiere stack Docker; se ejecuta en deploy-staging."
          fi
