name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [develop, presentacion]

permissions:
  contents: read

jobs:
  deploy-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Start staging stack with observability
        run: |
          docker compose -f docker-compose.dev.yml -f docker-compose.test.yml -f docker-compose.observability.yml up -d --build postgres keycloak backend frontend prometheus loki tempo grafana alertmanager alloy
          docker compose -f docker-compose.dev.yml -f docker-compose.test.yml -f docker-compose.observability.yml ps

      - name: Wait for backend health
        run: |
          for i in $(seq 1 36); do
            if curl -sf http://localhost:8080/actuator/health; then
              echo "Backend ready"
              exit 0
            fi
            echo "Waiting... ($i/36)"
            sleep 10
          done
          echo "Backend did not become healthy in time"
          docker compose -f docker-compose.dev.yml -f docker-compose.test.yml logs backend --tail 80
          exit 1

      - name: Wait for Keycloak realm
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8081/realms/inventory-realm/.well-known/openid-configuration; then
              echo "Keycloak ready"
              exit 0
            fi
            echo "Waiting for Keycloak... ($i/60)"
            sleep 5
          done
          docker compose -f docker-compose.dev.yml -f docker-compose.test.yml logs keycloak --tail 80
          exit 1

      - name: Post-deploy smoke
        env:
          RUN_OBSERVABILITY_SMOKE: 'true'
        run: |
          chmod +x scripts/post-deploy-smoke.sh
          ./scripts/post-deploy-smoke.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml -f docker-compose.test.yml -f docker-compose.observability.yml logs --tail 150

      - name: Upload logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml -f docker-compose.test.yml -f docker-compose.observability.yml logs --no-color > staging-compose.log

      - name: Archive staging logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-compose-logs
          path: staging-compose.log
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml -f docker-compose.test.yml -f docker-compose.observability.yml down -v
